name: Build Geranium IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Modify bundle IDs and app name (核心需求)
        run: |
          # 1. 修改主应用 Info.plist（云踪 + com.cloud.trail）
          plutil -replace CFBundleIdentifier -string "com.cloud.trail" Geranium/Info.plist
          plutil -replace CFBundleDisplayName -string "云踪" Geranium/Info.plist
          plutil -replace CFBundleName -string "云踪" Geranium/Info.plist
          
          # 2. 替换项目中旧的 Bundle ID
          sed -i '' 's/live\.cclerc\.geranium/com.cloud.trail/g' Geranium.xcodeproj/project.pbxproj
          sed -i '' 's/com\.private\.CloudRoam\.Bookmark-Location-in-Geranium/com.cloud.trail.BookmarkLocation/g' Geranium.xcodeproj/project.pbxproj

      - name: Clone RootHelper
        run: |
          rm -rf RootHelper
          git clone https://github.com/c22dev/Geranium-RH.git RootHelper
          git config submodule.RootHelper.url https://github.com/c22dev/Geranium-RH.git
          git submodule absorbgitdirs

      - name: Install basic dependencies
        run: brew install ldid xz

      - name: Install Theos (for RootHelper)
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Install iPhoneOS 14.5 SDK for Theos
        run: |
          mkdir -p $THEOS/sdks
          curl -L https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS14.5.sdk.tar.xz -o iPhoneOS14.5.sdk.tar.xz
          tar -xJf iPhoneOS14.5.sdk.tar.xz -C $THEOS/sdks/
          rm iPhoneOS14.5.sdk.tar.xz

      - name: Build RootHelper
        run: |
          cd RootHelper
          sed -i '' 's/^Package:.*/Package: geraniumroothelper/' control
          make package FINALPACKAGE=1
        env:
          THEOS: ${{ env.THEOS }}

      # 🚨 核心修复：不指定 SDK 版本，让 Xcode 自动选择可用的
      - name: Build Geranium (auto select available SDK)
        run: |
          # 打印所有可用 SDK，确认环境
          echo "=== 所有可用 SDK ==="
          xcodebuild -showsdks
          
          # 构建：移除 -sdk 参数，Xcode 自动用当前完整的 SDK
          xcodebuild \
            -project Geranium.xcodeproj \
            -scheme Geranium \
            -configuration Release \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            PRODUCT_BUNDLE_IDENTIFIER="com.cloud.trail" \
            PRODUCT_NAME="云踪" \
            ENABLE_PREVIEWS=NO \
            ONLY_ACTIVE_ARCH=NO \
            BUILD_DIR=./build

      # 手动打包 IPA
      - name: Package IPA (final step)
        run: |
          # 查找构建好的 app 文件
          APP_PATH=$(find ./build/Release-iphoneos -name "Geranium.app" -type d -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "❌ 未找到 Geranium.app，打印目录排查："
            ls -la ./build/
            exit 1
          fi
          
          # 打包 IPA
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r Geranium-云踪_$(date +%Y%m%d).ipa Payload/
          rm -rf Payload
          
          # 移动到 build 目录方便上传
          mkdir -p build
          mv Geranium-云踪_*.ipa build/
          echo "✅ IPA 生成成功：$(ls build/*.ipa)"

      # 上传 IPA 产物
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Geranium-IPA-云踪
          path: build/*.ipa
          if-no-files-found: warn