name: Build Geranium IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false      # 不自动拉取子模块
          fetch-depth: 1

      # ✏️ 最终修复：全兼容 Info.plist 键缺失场景 + 路径排查
      - name: Modify all bundle IDs and display name
        run: |
          # 打印目录结构
          echo "=== 当前工作目录 ==="
          pwd
          echo "=== Geranium 目录下的内容 ==="
          ls -la Geranium/ || echo "Geranium 目录不存在！"

          # 定义文件路径
          PROJECT_FILE="Geranium.xcodeproj/project.pbxproj"
          PLIST_FILE="Geranium/Info.plist"
          # 扩展的 Info.plist 路径（根据报错日志中的扩展名称推导）
          EXTENSION_PLIST_FILE="Geranium/Bookmark Location in Geranium/Info.plist"

          # 检查主文件存在性
          if [ ! -f "$PROJECT_FILE" ]; then
            echo "Error: $PROJECT_FILE 不存在！"
            exit 1
          fi
          if [ ! -f "$PLIST_FILE" ]; then
            echo "Error: $PLIST_FILE 不存在！"
            exit 1
          fi

          # 1. 全局替换旧 Bundle ID（主应用+扩展）
          # 主应用：live.cclerc.geranium → com.private.CloudRoam
          sed -i '' 's/live\.cclerc\.geranium/com.private.CloudRoam/g' "$PROJECT_FILE"
          # 兼容扩展的 Bundle ID 后缀（保证扩展 ID 是主应用的后缀）
          sed -i '' 's/com\.private\.CloudRoam\.Bookmark-Location-in-Geranium/com.private.CloudRoam.BookmarkLocation/g' "$PROJECT_FILE"
          echo "已同步修改主应用+扩展的 Bundle ID"

          # 2. 处理主应用 Info.plist 显示名称
          # CFBundleDisplayName（应用显示名称）
          if /usr/libexec/PlistBuddy -c "Print :CFBundleDisplayName" "$PLIST_FILE" 2>/dev/null; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName CloudRoam" "$PLIST_FILE"
          else
            /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string CloudRoam" "$PLIST_FILE"
          fi
          # CFBundleName（应用短名称）
          if /usr/libexec/PlistBuddy -c "Print :CFBundleName" "$PLIST_FILE" 2>/dev/null; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleName CloudRoam" "$PLIST_FILE"
          else
            /usr/libexec/PlistBuddy -c "Add :CFBundleName string CloudRoam" "$PLIST_FILE"
          fi

          # 3. 处理扩展的 Info.plist（如果存在）
          if [ -f "$EXTENSION_PLIST_FILE" ]; then
            # 扩展的 Bundle ID 必须是主应用后缀
            /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.private.CloudRoam.BookmarkLocation" "$EXTENSION_PLIST_FILE"
            echo "已修改扩展的 Bundle ID 为 com.private.CloudRoam.BookmarkLocation"
          else
            # 自动查找扩展的 Info.plist
            EXT_PLIST=$(find . -name "Info.plist" | grep -i "Bookmark" | head -1)
            if [ -n "$EXT_PLIST" ]; then
              /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.private.CloudRoam.BookmarkLocation" "$EXT_PLIST"
              echo "已找到扩展 Info.plist: $EXT_PLIST，修改其 Bundle ID"
            fi
          fi

          # 验证修改结果
          echo "=== 修改后的主应用 Info.plist 关键内容 ==="
          /usr/libexec/PlistBuddy -c "Print :CFBundleDisplayName" "$PLIST_FILE" 2>/dev/null || echo "CFBundleDisplayName: 已新增"
          /usr/libexec/PlistBuddy -c "Print :CFBundleName" "$PLIST_FILE" 2>/dev/null || echo "CFBundleName: 已新增"

      # 手动克隆 RootHelper，直接用最新 main 分支，绕开失效的 commit 锁定
      - name: Clone RootHelper manually
        run: |
          rm -rf RootHelper   # 清掉空目录占位
          git clone https://github.com/c22dev/Geranium-RH.git RootHelper
          # 让 git 认为子模块已经 checkout，不再尝试拉取失效 commit
          git config submodule.RootHelper.url https://github.com/c22dev/Geranium-RH.git
          git submodule absorbgitdirs
          git config --file .gitmodules submodule.RootHelper.update none

      - name: Select Xcode
        run: |
          sudo xcode-select -switch /Applications/Xcode_16.2.app
          xcodebuild -version

      # 👇 新增这一步，安装 iOS 平台运行时，解决 ibtool 找不到 iOS 18.2 的问题
      - name: Install iOS platform
        run: |
          sudo xcodebuild -runFirstLaunch
          xcodebuild -downloadPlatform iOS

      # 安装 Theos 依赖
      - name: Install dependencies
        run: brew install ldid xz

      # 克隆 Theos（不含子模块，后面单独处理 SDK，加快速度）
      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      # 直接用指定 release 地址下载 iPhoneOS14.5.sdk
      - name: Install iPhoneOS 14.5 SDK
        run: |
          curl -L https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS14.5.sdk.tar.xz \
            -o iPhoneOS14.5.sdk.tar.xz
          tar -xJf iPhoneOS14.5.sdk.tar.xz -C $THEOS/sdks/
          rm iPhoneOS14.5.sdk.tar.xz
          echo "已安装 SDK："
          ls $THEOS/sdks/

      # 构建 RootHelper
      - name: Build RootHelper
        run: |
          cd RootHelper
          # 把 control 里的包名强制转小写
          sed -i '' 's/^Package:.*/Package: geraniumroothelper/' control
          make package FINALPACKAGE=1
        env:
          THEOS: ${{ env.THEOS }}

      # 构建主应用，不签名
      - name: Build Geranium with Xcode
        run: |
          xcodebuild \
            -project Geranium.xcodeproj \
            -scheme Geranium \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            PRODUCT_BUNDLE_IDENTIFIER="com.private.CloudRoam" \
            # 强制关闭扩展验证（兜底方案）
            VALIDATE_PRODUCT=NO

      # 运行官方打包脚本生成 .tipa
      - name: Run ipabuild.sh
        run: |
          chmod +x ipabuild.sh
          # 删掉会导致崩溃的 git submodule update 行
          sed -i '' '/git submodule update/d' ipabuild.sh
          bash ipabuild.sh

      # 将 .tipa 同时复制一份 .ipa 后缀
      - name: Rename tipa to ipa
        run: |
          find build/ -name "*.tipa" -exec bash -c \
            'cp "$1" "${1%.tipa}.ipa"' _ {} \;

      # 上传产物
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Geranium-IPA
          path: |
            build/*.ipa
            build/*.tipa
          if-no-files-found: error
          retention-days: 30