name: Build Geranium IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false      # 不自动拉取子模块
          fetch-depth: 1

      # ✏️ 修改 Bundle ID 和显示名称（修复 21-33 行）
      - name: Modify bundle ID and display name
        run: |
          # 先检查关键文件是否存在，避免路径错误
          if [ ! -f "Geranium.xcodeproj/project.pbxproj" ]; then
            echo "Error: project.pbxproj not found!"
            exit 1
          fi
          if [ ! -f "Geranium/Info.plist" ]; then
            echo "Error: Info.plist not found!"
            exit 1
          fi

          # 1. 修改 xcodeproj 中的 Bundle ID（保留原有逻辑，增加容错）
          sed -i '' \
            's/PRODUCT_BUNDLE_IDENTIFIER = live\.cclerc\.geranium/PRODUCT_BUNDLE_IDENTIFIER = com.private.CloudRoam/g' \
            Geranium.xcodeproj/project.pbxproj

          # 2. 处理 CFBundleDisplayName（先查是否存在，不存在则添加）
          if /usr/libexec/PlistBuddy -c "Print :CFBundleDisplayName" Geranium/Info.plist 2>/dev/null; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName CloudRoam" Geranium/Info.plist
          else
            /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string CloudRoam" Geranium/Info.plist
          fi

          # 3. 修改 CFBundleName（必选键，直接 Set）
          /usr/libexec/PlistBuddy -c "Set :CFBundleName CloudRoam" Geranium/Info.plist

      # 手动克隆 RootHelper，直接用最新 main 分支，绕开失效的 commit 锁定
      - name: Clone RootHelper manually
        run: |
          rm -rf RootHelper   # 清掉空目录占位
          git clone https://github.com/c22dev/Geranium-RH.git RootHelper
          # 让 git 认为子模块已经 checkout，不再尝试拉取失效 commit
          git config submodule.RootHelper.url https://github.com/c22dev/Geranium-RH.git
          git submodule absorbgitdirs
          git config --file .gitmodules submodule.RootHelper.update none

      - name: Select Xcode
        run: |
          sudo xcode-select -switch /Applications/Xcode_16.2.app
          xcodebuild -version

      # 👇 新增这一步，安装 iOS 平台运行时，解决 ibtool 找不到 iOS 18.2 的问题
      - name: Install iOS platform
        run: |
          sudo xcodebuild -runFirstLaunch
          xcodebuild -downloadPlatform iOS

      # 安装 Theos 依赖
      - name: Install dependencies
        run: brew install ldid xz

      # 克隆 Theos（不含子模块，后面单独处理 SDK，加快速度）
      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      # 直接用指定 release 地址下载 iPhoneOS14.5.sdk
      - name: Install iPhoneOS 14.5 SDK
        run: |
          curl -L https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS14.5.sdk.tar.xz \
            -o iPhoneOS14.5.sdk.tar.xz
          tar -xJf iPhoneOS14.5.sdk.tar.xz -C $THEOS/sdks/
          rm iPhoneOS14.5.sdk.tar.xz
          echo "已安装 SDK："
          ls $THEOS/sdks/

      # 构建 RootHelper
      - name: Build RootHelper
        run: |
          cd RootHelper
          # 把 control 里的包名强制转小写
          sed -i '' 's/^Package:.*/Package: geraniumroothelper/' control
          make package FINALPACKAGE=1
        env:
          THEOS: ${{ env.THEOS }}

      # 构建主应用，不签名（修复 99-100 行语法错误）
      - name: Build Geranium with Xcode
        run: |
          xcodebuild \
            -project Geranium.xcodeproj \
            -scheme Geranium \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            PRODUCT_BUNDLE_IDENTIFIER="com.private.CloudRoam" \
            PRODUCT_NAME="CloudRoam"  # 关键：去掉行尾多余换行，参数用 \ 连接

      # 运行官方打包脚本生成 .tipa
      - name: Run ipabuild.sh
        run: |
          chmod +x ipabuild.sh
          # ipabuild.sh 内部会再次 git submodule update，遇到失效 commit 会崩
          # 用 sed 删掉这一行，因为 RootHelper 我们已经手动 clone 好了
          sed -i '' '/git submodule update/d' ipabuild.sh
          bash ipabuild.sh

      # 将 .tipa 同时复制一份 .ipa 后缀（两者内容完全相同）
      - name: Rename tipa to ipa
        run: |
          find build/ -name "*.tipa" -exec bash -c \
            'cp "$1" "${1%.tipa}.ipa"' _ {} \;

      # 上传产物（修复 Node.js 20 弃用警告：统一用 v4）
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Geranium-IPA
          path: |
            build/*.ipa
            build/*.tipa
          if-no-files-found: error
          retention-days: 30