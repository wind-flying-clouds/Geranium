name: Build Geranium IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Modify bundle IDs and names (main + extension)
        run: |
          # 定义路径
          PROJECT_FILE="Geranium.xcodeproj/project.pbxproj"
          MAIN_PLIST_FILE="Geranium/Info.plist"
          
          # 检查文件存在性
          if [ ! -f "$PROJECT_FILE" ] || [ ! -f "$MAIN_PLIST_FILE" ]; then
            echo "Error: 核心文件缺失！"
            exit 1
          fi

          # 1. 修改主应用配置
          sed -i '' 's/live\.cclerc\.geranium/com.cloud.trail/g' "$PROJECT_FILE"
          sed -i '' 's/com\.private\.CloudRoam\.Bookmark-Location-in-Geranium/com.cloud.trail.BookmarkLocation/g' "$PROJECT_FILE"
          
          # 主应用 Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName 云踪" "$MAIN_PLIST_FILE" 2>/dev/null || /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string 云踪" "$MAIN_PLIST_FILE"
          /usr/libexec/PlistBuddy -c "Set :CFBundleName 云踪" "$MAIN_PLIST_FILE" 2>/dev/null || /usr/libexec/PlistBuddy -c "Add :CFBundleName string 云踪" "$MAIN_PLIST_FILE"
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.cloud.trail" "$MAIN_PLIST_FILE" 2>/dev/null || /usr/libexec/PlistBuddy -c "Add :CFBundleIdentifier string com.cloud.trail" "$MAIN_PLIST_FILE"

          # 2. 修改扩展配置（独立名称）
          EXT_PLIST_LIST=$(find . -name "Info.plist" | grep -i "bookmark" | grep -v "Preview" | grep -v "Assets")
          for EXT_PLIST in $EXT_PLIST_LIST; do
            if /usr/libexec/PlistBuddy -c "Print" "$EXT_PLIST" 2>/dev/null; then
              /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.cloud.trail.BookmarkLocation" "$EXT_PLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Add :CFBundleIdentifier string com.cloud.trail.BookmarkLocation" "$EXT_PLIST"
              /usr/libexec/PlistBuddy -c "Set :CFBundleName 云踪-书签扩展" "$EXT_PLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Add :CFBundleName string 云踪-书签扩展" "$EXT_PLIST"
            fi
          done

          # 3. 修改 project.pbxproj 中的最低部署版本为 16.0（兼容旧 SDK）
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 16.0;/g' "$PROJECT_FILE"

      - name: Clone RootHelper manually
        run: |
          rm -rf RootHelper
          git clone https://github.com/c22dev/Geranium-RH.git RootHelper
          git config submodule.RootHelper.url https://github.com/c22dev/Geranium-RH.git
          git submodule absorbgitdirs
          git config --file .gitmodules submodule.RootHelper.update none

      # 强制切换到有完整平台组件的 Xcode 版本
      - name: Select compatible Xcode version
        run: |
          # 优先使用 Xcode 15.x，如果不存在则用默认
          XCODE_15_PATH=$(ls -d /Applications/Xcode_15*.app | head -1)
          if [ -n "$XCODE_15_PATH" ]; then
            sudo xcode-select -switch "$XCODE_15_PATH"
          else
            XCODE_PATH=$(ls -d /Applications/Xcode*.app | head -1)
            sudo xcode-select -switch "$XCODE_PATH"
          fi
          # 打印可用的 SDK 版本（确认 17.x 存在）
          echo "=== Xcode 版本信息 ==="
          xcodebuild -version
          echo "=== 可用 iOS SDK 列表 ==="
          xcodebuild -showsdks | grep iphoneos

      - name: Install dependencies
        run: brew install ldid xz

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Install iPhoneOS 14.5 SDK for Theos
        run: |
          mkdir -p $THEOS/sdks
          curl -L https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS14.5.sdk.tar.xz -o iPhoneOS14.5.sdk.tar.xz
          tar -xJf iPhoneOS14.5.sdk.tar.xz -C $THEOS/sdks/
          rm iPhoneOS14.5.sdk.tar.xz

      - name: Build RootHelper
        run: |
          cd RootHelper
          sed -i '' 's/^Package:.*/Package: geraniumroothelper/' control
          make package FINALPACKAGE=1
        env:
          THEOS: ${{ env.THEOS }}

      # 🚨 核心修复：修正语法错误 + 完整构建命令
      - name: Build Geranium (fixed syntax + iOS 17 SDK)
        run: |
          # 强制使用 iOS 17.x SDK（优先 17.5，无则 17.0）
          SDK_VERSION=$(xcodebuild -showsdks | grep iphoneos | grep -E "17\.[0-9]" | awk '{print $2}' | sed 's/iphoneos//' | tail -1)
          if [ -z "$SDK_VERSION" ]; then
            SDK_VERSION="17.0"
          fi
          echo "使用兼容的 iOS SDK 版本：$SDK_VERSION"
          
          # 构建主应用（修正语法：移除行内注释，确保参数连续）
          xcodebuild \
            -project Geranium.xcodeproj \
            -target Geranium \
            -configuration Release \
            -sdk iphoneos${SDK_VERSION} \
            -destination "generic/platform=iOS" \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            PRODUCT_BUNDLE_IDENTIFIER="com.cloud.trail" \
            PRODUCT_NAME="云踪" \
            VALIDATE_PRODUCT=NO \
            ENABLE_STRICT_EXTENSION_SIGNING=NO \
            ENABLE_PREVIEWS=NO \
            ASSETCATALOG_COMPILER_OPTIMIZATION=space \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=NO

      # 手动打包 IPA（最稳定的方式）
      - name: Package IPA manually
        run: |
          # 检查主应用是否构建成功
          APP_PATH=$(find build/DerivedData -name "Geranium.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: 主应用构建失败，未找到 Geranium.app！"
            ls -la build/DerivedData/Build/Products/
            exit 1
          fi
          
          # 创建 IPA 打包目录
          mkdir -p build/IPA/Payload
          # 复制主应用到 Payload
          cp -R "$APP_PATH" build/IPA/Payload/
          # 打包成 IPA
          cd build/IPA
          zip -r "../Geranium-云踪_$(date +%Y%m%d).ipa" Payload/
          # 清理临时文件
          cd ../
          rm -rf IPA
          
          # 验证 IPA 是否生成
          echo "=== 生成的 IPA 文件 ==="
          ls -la build/*.ipa

      # 上传产物
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Geranium-IPA
          path: build/*.ipa
          if-no-files-found: warn