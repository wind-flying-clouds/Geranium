name: Build Geranium IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 修复 Node.js 20 弃用警告

jobs:
  build:
    runs-on: macos-latest

    steps:
      # 关掉 submodules: recursive，改为手动处理
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false      # ← 先不拉子模块
          fetch-depth: 0

      # 手动初始化子模块，强制从上游原始仓库拉取
      - name: Init submodules from upstream
        run: |
          git submodule init
          # 强制把 RootHelper 子模块的 URL 指向上游原始仓库
          git config submodule.RootHelper.url https://github.com/Wtrwx/Geranium.git || true
          # 读取 .gitmodules 里真实的上游地址来覆盖
          git submodule sync
          git submodule update --init --recursive --remote

      - name: Select Xcode
        run: |
          sudo xcode-select -switch /Applications/Xcode_16.2.app
          xcodebuild -version

      - name: Install Theos
        run: |
          brew install ldid xz
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Install iPhoneOS 15.6 SDK
        run: |
          git clone --depth=1 --filter=blob:none --sparse https://github.com/theos/sdks.git ~/theos-sdks
          cd ~/theos-sdks
          git sparse-checkout set iPhoneOS15.6.sdk
          cp -r iPhoneOS15.6.sdk $THEOS/sdks/
          echo "✅ SDK installed: $(ls $THEOS/sdks/)"

      - name: Build RootHelper
        run: |
          cd RootHelper
          make package FINALPACKAGE=1
        env:
          THEOS: ${{ env.THEOS }}

      - name: Build Geranium with Xcode
        run: |
          xcodebuild \
            -project Geranium.xcodeproj \
            -scheme Geranium \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath build/DerivedData \
            SDKROOT=$THEOS/sdks/iPhoneOS15.6.sdk \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Run ipabuild.sh
        run: |
          chmod +x ipabuild.sh
          bash ipabuild.sh

      - name: Rename tipa to ipa
        run: |
          find build/ -name "*.tipa" -exec bash -c 'cp "$1" "${1%.tipa}.ipa"' _ {} \;

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Geranium-IPA
          path: |
            build/*.ipa
            build/*.tipa
          if-no-files-found: error
          retention-days: 30