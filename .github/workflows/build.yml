name: Build Geranium IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      # 仅修改 Bundle ID 和显示名称，保留你之前的成功逻辑
      - name: Modify bundle ID and display name
        run: |
          # 自定义参数（你指定的配置）
          MAIN_BUNDLE_ID="com.cloud.trail"
          DISPLAY_NAME="云踪"
          BUNDLE_NAME="CloudTrail"

          # 1. 全局替换 Bundle ID（你之前成功的写法）
          sed -i '' 's/live\.cclerc\.geranium/'"${MAIN_BUNDLE_ID}"'/g' Geranium.xcodeproj/project.pbxproj
          
          # 2. 处理 Info.plist 显示名称（兼容键缺失）
          PLIST_FILE="Geranium/Info.plist"
          # CFBundleDisplayName（云踪）
          if /usr/libexec/PlistBuddy -c "Print :CFBundleDisplayName" "$PLIST_FILE" 2>/dev/null; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName ${DISPLAY_NAME}" "$PLIST_FILE"
          else
            /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string ${DISPLAY_NAME}" "$PLIST_FILE"
          fi
          # CFBundleName（CloudTrail）
          if /usr/libexec/PlistBuddy -c "Print :CFBundleName" "$PLIST_FILE" 2>/dev/null; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleName ${BUNDLE_NAME}" "$PLIST_FILE"
          else
            /usr/libexec/PlistBuddy -c "Add :CFBundleName string ${BUNDLE_NAME}" "$PLIST_FILE"
          fi

      # 你之前能成功的 RootHelper 克隆逻辑
      - name: Clone RootHelper manually
        run: |
          rm -rf RootHelper
          git clone https://github.com/c22dev/Geranium-RH.git RootHelper
          git config submodule.RootHelper.url https://github.com/c22dev/Geranium-RH.git
          git submodule absorbgitdirs
          git config --file .gitmodules submodule.RootHelper.update none

      # 恢复你之前的 Xcode 选择逻辑（仅基础选择，不下载平台）
      - name: Select Xcode
        run: |
          sudo xcode-select -switch /Applications/Xcode_16.2.app
          xcodebuild -version

      # 你之前能成功的依赖安装
      - name: Install dependencies
        run: brew install ldid xz

      # 你之前能成功的 Theos 安装
      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      # 你之前能成功的 SDK 安装
      - name: Install iPhoneOS 14.5 SDK
        run: |
          curl -L https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS14.5.sdk.tar.xz -o iPhoneOS14.5.sdk.tar.xz
          tar -xJf iPhoneOS14.5.sdk.tar.xz -C $THEOS/sdks/
          rm iPhoneOS14.5.sdk.tar.xz

      # 你之前能成功的 RootHelper 构建
      - name: Build RootHelper
        run: |
          cd RootHelper
          sed -i '' 's/^Package:.*/Package: geraniumroothelper/' control
          make package FINALPACKAGE=1
        env:
          THEOS: ${{ env.THEOS }}

      # 恢复你之前能成功的 Xcodebuild 命令（仅改 Bundle ID）
      - name: Build Geranium with Xcode
        run: |
          xcodebuild \
            -project Geranium.xcodeproj \
            -scheme Geranium \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            PRODUCT_BUNDLE_IDENTIFIER="${MAIN_BUNDLE_ID}"

      # 你之前能成功的打包脚本
      - name: Run ipabuild.sh
        run: |
          chmod +x ipabuild.sh
          sed -i '' '/git submodule update/d' ipabuild.sh
          bash ipabuild.sh

      # 你之前能成功的重命名逻辑
      - name: Rename tipa to ipa
        run: |
          find build/ -name "*.tipa" -exec bash -c 'cp "$1" "${1%.tipa}.ipa"' _ {} \;

      # 你之前能成功的产物上传
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Geranium-IPA
          path: |
            build/*.ipa
            build/*.tipa
          if-no-files-found: error
          retention-days: 30